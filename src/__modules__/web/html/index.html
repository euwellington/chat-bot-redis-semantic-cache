<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&family=Google+Sans+Display:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #131314;
    --surface: #1e1f20;
    --surface2: #282a2c;
    --surface3: #303134;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e3e3e3;
    --text-muted: #9aa0a6;
    --text-dim: #5f6368;
    --blue: #8ab4f8;
    --blue-glow: rgba(138,180,248,0.15);
    --green: #81c995;
    --green-glow: rgba(129,201,149,0.15);
    --amber: #fdd663;
    --amber-glow: rgba(253,214,99,0.12);
    --red: #f28b82;
    --red-glow: rgba(242,139,130,0.15);
    --purple: #c58af9;
    --purple-glow: rgba(197,138,249,0.15);
    --teal: #78d9ec;
    --radius: 24px;
    --radius-sm: 12px;
    --radius-xs: 8px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Google Sans', system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.6;
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 860px;
    margin: 0 auto;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Google Sans Display', sans-serif;
    font-size: 20px;
    font-weight: 500;
    letter-spacing: -0.3px;
  }

  .logo-gem {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
  }

  #output {
    flex: 1;
    overflow-y: auto;
    padding: 0 24px 16px;
    scroll-behavior: smooth;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  #output::-webkit-scrollbar { width: 4px; }
  #output::-webkit-scrollbar-track { background: transparent; }
  #output::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

  #welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 40px 0;
    animation: fade-up 0.5s ease both;
  }

  #welcome .gem-big {
    animation: gem-spin 6s linear infinite;
  }

  @keyframes gem-spin {
    0%   { transform: rotate(0deg) scale(1); }
    25%  { transform: rotate(5deg) scale(1.05); }
    50%  { transform: rotate(0deg) scale(1); }
    75%  { transform: rotate(-5deg) scale(1.05); }
    100% { transform: rotate(0deg) scale(1); }
  }

  #welcome h1 {
    font-family: 'Google Sans Display', sans-serif;
    font-size: 38px;
    font-weight: 400;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #8ab4f8 0%, #c58af9 50%, #f28b82 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  #welcome p {
    color: var(--text-muted);
    font-size: 16px;
  }

  .user-bubble {
    align-self: flex-end;
    max-width: 75%;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    border-bottom-right-radius: 6px;
    padding: 12px 18px;
    font-size: 15px;
    line-height: 1.55;
    color: var(--text);
    animation: bubble-in 0.25s cubic-bezier(0.34,1.56,0.64,1) both;
    margin-top: 12px;
  }

  @keyframes bubble-in {
    from { opacity: 0; transform: translateY(10px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .ai-block {
    align-self: flex-start;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 6px;
    animation: fade-up 0.2s ease both;
    margin-top: 4px;
  }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .step-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.2px;
    border: 0.5px solid transparent;
    animation: pill-pop 0.2s cubic-bezier(0.34,1.56,0.64,1) both;
    width: fit-content;
  }

  @keyframes pill-pop {
    from { opacity: 0; transform: scale(0.8); }
    to   { opacity: 1; transform: scale(1); }
  }

  .step-pill .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .step-pill.start    { background: var(--blue-glow);   color: var(--blue);   border-color: rgba(138,180,248,0.2); }
  .step-pill.thinking { background: var(--purple-glow); color: var(--purple); border-color: rgba(197,138,249,0.2); }
  .step-pill.searching{ background: var(--teal-glow, rgba(120,217,236,0.12)); color: var(--teal); border-color: rgba(120,217,236,0.2); }
  .step-pill.tool     { background: var(--amber-glow);  color: var(--amber);  border-color: rgba(253,214,99,0.2); }
  .step-pill.finalizing{background: var(--blue-glow);   color: var(--blue);   border-color: rgba(138,180,248,0.2); }
  .step-pill.finished { background: var(--green-glow);  color: var(--green);  border-color: rgba(129,201,149,0.2); }
  .step-pill.error    { background: var(--red-glow);    color: var(--red);    border-color: rgba(242,139,130,0.2); }

  .step-pill.start    .dot { background: var(--blue); }
  .step-pill.thinking .dot { background: var(--purple); animation: pulse-dot 1.2s ease infinite; }
  .step-pill.searching .dot { background: var(--teal); animation: pulse-dot 1s ease infinite; }
  .step-pill.tool     .dot { background: var(--amber); animation: pulse-dot 0.9s ease infinite; }
  .step-pill.finalizing .dot { background: var(--blue); animation: pulse-dot 1s ease infinite; }
  .step-pill.finished .dot { background: var(--green); }
  .step-pill.error    .dot { background: var(--red); }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.7); }
  }

  .tool-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    animation: fade-up 0.25s ease both;
    transition: border-color 0.3s, transform 0.3s, opacity 0.3s;
  }

  .tool-card.active {
    border-color: rgba(253,214,99,0.3);
    box-shadow: 0 0 20px rgba(253,214,99,0.06);
  }

  .tool-card.done {
    border-color: rgba(129,201,149,0.2);
  }

  .tool-card.entering {
    opacity: 0;
    transform: translateY(14px) scale(0.98);
  }

  .tool-card.entering.animate-in {
    animation: tool-enter 0.32s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes tool-enter {
    from { opacity: 0; transform: translateY(14px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .tool-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-bottom: 0.5px solid var(--border);
  }

  .tool-icon-wrap {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: var(--amber-glow);
    border: 0.5px solid rgba(253,214,99,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .tool-card.done .tool-icon-wrap {
    background: var(--green-glow);
    border-color: rgba(129,201,149,0.2);
  }

  .tool-meta { flex: 1; min-width: 0; }

  .tool-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .tool-status {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .tool-badge {
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 10px;
    flex-shrink: 0;
    transition: all 0.3s;
  }

  .tool-badge.running {
    background: var(--amber-glow);
    color: var(--amber);
    border: 0.5px solid rgba(253,214,99,0.2);
  }

  .tool-badge.done {
    background: var(--green-glow);
    color: var(--green);
    border: 0.5px solid rgba(129,201,149,0.2);
  }

  .tool-progress {
    height: 2px;
    background: var(--surface3);
    overflow: hidden;
  }

  .tool-progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--amber), #f8c537);
    width: 0%;
    transition: width 0.4s ease;
    border-radius: 1px;
  }

  .tool-card.active .tool-progress-bar {
    animation: progress-run 2s ease-in-out infinite;
  }

  .tool-card.done .tool-progress-bar {
    width: 100% !important;
    background: var(--green);
    animation: none;
  }

  @keyframes progress-run {
    0%   { width: 5%;  margin-left: 0; }
    50%  { width: 40%; margin-left: 30%; }
    100% { width: 5%;  margin-left: 95%; }
  }

  .tool-body {
    padding: 10px 14px;
    font-size: 12.5px;
    color: var(--text-muted);
    font-family: 'Google Sans Mono', 'Courier New', monospace;
    min-height: 0;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease, padding 0.3s ease;
    line-height: 1.5;
  }

  .tool-body.has-content {
    max-height: 120px;
    overflow-y: auto;
  }

  .processing-card {
    background: transparent;
    padding: 4px 0;
    animation: fade-up 0.2s ease both;
  }

  .processing-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .gem-small {
    animation: gem-spin 3s linear infinite;
    flex-shrink: 0;
  }

  .processing-label {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  .processing-body {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .processing-body.typing::after {
    content: '▋';
    display: inline-block;
    color: var(--blue);
    animation: blink 0.8s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  .chunk { display: inline; }

  .status-line {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    padding: 6px 0;
    color: var(--text-muted);
    animation: fade-up 0.2s ease both;
  }

  .status-line.success { color: var(--green); }
  .status-line.error   { color: var(--red); }

  .status-icon {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    flex-shrink: 0;
  }

  .status-line.success .status-icon { background: var(--green-glow); }
  .status-line.error   .status-icon { background: var(--red-glow); }

  .turn-divider {
    height: 1px;
    background: var(--border);
    margin: 8px 0;
    opacity: 0.5;
  }

  #input-area {
    flex-shrink: 0;
    padding: 12px 24px 24px;
  }

  .input-wrap {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 12px 12px 12px 20px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-wrap:focus-within {
    border-color: rgba(138,180,248,0.4);
    box-shadow: 0 0 0 2px rgba(138,180,248,0.08);
  }

  #question {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Google Sans', sans-serif;
    font-size: 15px;
    line-height: 1.55;
    resize: none;
    min-height: 24px;
    max-height: 180px;
    overflow-y: auto;
    padding: 2px 0;
  }

  #question::placeholder { color: var(--text-dim); }

  #question::-webkit-scrollbar { width: 3px; }
  #question::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

  #send-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: none;
    background: var(--blue);
    color: #0a0a0a;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, background 0.2s, opacity 0.2s;
    opacity: 0.4;
  }

  #send-btn.ready {
    opacity: 1;
    transform: scale(1);
  }

  #send-btn.ready:hover { transform: scale(1.08); background: #9fc5ff; }
  #send-btn.ready:active { transform: scale(0.94); }

  #send-btn svg { width: 18px; height: 18px; }

  .disclaimer {
    text-align: center;
    font-size: 11.5px;
    color: var(--text-dim);
    margin-top: 10px;
    letter-spacing: 0.1px;
  }

  .markdown-body {
    color: var(--text);
    line-height: 1.7;
    word-break: break-word;
  }

  .markdown-body > * + * { margin-top: 12px; }
  .markdown-body h1,
  .markdown-body h2,
  .markdown-body h3 {
    font-family: 'Google Sans Display', sans-serif;
    font-weight: 500;
    line-height: 1.25;
    letter-spacing: 0;
  }

  .markdown-body h1 { font-size: 26px; }
  .markdown-body h2 { font-size: 21px; }
  .markdown-body h3 { font-size: 17px; }
  .markdown-body p { margin: 0; }

  .markdown-body a {
    color: var(--blue);
    text-decoration: none;
    border-bottom: 1px solid rgba(138,180,248,0.35);
  }

  .markdown-body a:hover {
    color: #a8c7fa;
    border-bottom-color: #a8c7fa;
  }

  .markdown-body img {
    display: block;
    width: 100%;
    max-height: 360px;
    object-fit: cover;
    border-radius: var(--radius-xs);
    border: 0.5px solid var(--border2);
    background: var(--surface2);
  }

  .markdown-body figure { margin: 0; }
  .markdown-body figcaption {
    margin-top: 6px;
    color: var(--text-muted);
    font-size: 12px;
  }

  .markdown-body ul,
  .markdown-body ol {
    padding-left: 22px;
  }

  .markdown-body li + li { margin-top: 4px; }

  .markdown-body blockquote {
    border-left: 3px solid var(--blue);
    padding: 8px 0 8px 14px;
    color: var(--text-muted);
    background: rgba(138,180,248,0.06);
    border-radius: 0 var(--radius-xs) var(--radius-xs) 0;
  }

  .markdown-body code {
    font-family: 'Google Sans Mono', 'Courier New', monospace;
    font-size: 0.92em;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 6px;
    padding: 1px 5px;
  }

  .markdown-body pre {
    overflow-x: auto;
    background: #0f1011;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-xs);
    padding: 12px;
  }

  .markdown-body pre code {
    display: block;
    padding: 0;
    background: transparent;
    border: none;
    white-space: pre;
  }

  .md-table-wrap {
    overflow-x: auto;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-xs);
  }

  .markdown-body table {
    width: 100%;
    border-collapse: collapse;
    min-width: 420px;
    font-size: 13px;
  }

  .markdown-body th,
  .markdown-body td {
    text-align: left;
    padding: 9px 10px;
    border-bottom: 0.5px solid var(--border);
    vertical-align: top;
  }

  .markdown-body th {
    color: var(--text);
    background: var(--surface2);
    font-weight: 600;
  }

  .markdown-body tr:last-child td { border-bottom: none; }
  .markdown-body tr:hover td { background: rgba(255,255,255,0.03); }

  .md-badge {
    display: inline-flex;
    align-items: center;
    min-height: 22px;
    padding: 2px 8px;
    border-radius: 999px;
    border: 0.5px solid rgba(138,180,248,0.22);
    background: var(--blue-glow);
    color: var(--blue);
    font-size: 12px;
    font-weight: 500;
    vertical-align: middle;
  }

  .md-card,
  .md-link-card,
  .md-location-card {
    border: 0.5px solid var(--border);
    border-radius: var(--radius-xs);
    background: var(--surface);
    padding: 12px;
    transition: border-color 0.2s, background 0.2s, transform 0.2s;
  }

  .md-card:hover,
  .md-link-card:hover,
  .md-location-card:hover {
    border-color: rgba(138,180,248,0.35);
    background: var(--surface2);
    transform: translateY(-1px);
  }

  .md-card-title,
  .md-link-title,
  .md-location-title {
    color: var(--text);
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 4px;
  }

  .md-card-body,
  .md-link-desc,
  .md-location-meta {
    color: var(--text-muted);
    font-size: 13px;
  }

  .md-link-card {
    display: block;
    text-decoration: none;
    border-bottom: 0.5px solid var(--border);
  }

  .md-link-domain {
    color: var(--text-dim);
    font-size: 12px;
    margin-top: 6px;
  }

  .md-location-grid,
  .md-link-grid {
    display: grid;
    gap: 10px;
  }

  .md-location-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }

  .md-action-link {
    display: inline-flex;
    align-items: center;
    min-height: 28px;
    padding: 4px 9px;
    border-radius: 999px;
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    color: var(--blue) !important;
    font-size: 12px;
  }

  .md-collapse {
    border: 0.5px solid var(--border);
    border-radius: var(--radius-xs);
    background: var(--surface);
    overflow: hidden;
  }

  .md-collapse > summary {
    cursor: pointer;
    padding: 10px 12px;
    color: var(--text);
    font-weight: 600;
    list-style: none;
  }

  .md-collapse > summary::-webkit-details-marker { display: none; }
  .md-collapse > summary::after {
    content: '+';
    float: right;
    color: var(--text-muted);
  }

  .md-collapse[open] > summary::after { content: '−'; }

  .md-collapse-body {
    border-top: 0.5px solid var(--border);
    padding: 12px;
  }

  .tool-timeline-wrap {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 8px;
    padding: 10px 12px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-xs);
    background: var(--surface);
    animation: fade-up 0.25s ease both;
  }

  .tool-timeline-title {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 600;
  }

  .tool-timeline {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .tool-timeline-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-height: 28px;
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    color: var(--text);
    font-size: 12px;
    font-weight: 500;
    animation: chip-in 0.28s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes chip-in {
    from { opacity: 0; transform: translateY(8px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .tool-timeline-index {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--blue-glow);
    color: var(--blue);
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">
      <svg class="logo-gem" viewBox="0 0 28 28" fill="none">
        <path d="M14 2L20 10L14 14L8 10Z" fill="#8ab4f8"/>
        <path d="M14 14L20 10L22 18L14 26Z" fill="#c58af9"/>
        <path d="M14 14L8 10L6 18L14 26Z" fill="#f28b82"/>
        <path d="M14 14L6 18L14 26L22 18Z" fill="rgba(197,138,249,0.4)"/>
      </svg>
      AI Studio
    </div>
  </header>

  <div id="output">
    <div id="welcome">
      <svg class="gem-big" width="64" height="64" viewBox="0 0 64 64" fill="none">
        <path d="M32 4L46 22L32 32L18 22Z" fill="#8ab4f8"/>
        <path d="M32 32L46 22L50 42L32 60Z" fill="#c58af9"/>
        <path d="M32 32L18 22L14 42L32 60Z" fill="#f28b82"/>
        <path d="M32 32L14 42L32 60L50 42Z" fill="rgba(197,138,249,0.35)"/>
      </svg>
      <h1>Olá, como posso ajudar?</h1>
      <p>Faça uma pergunta ou dê um comando.</p>
    </div>
  </div>

  <div id="input-area">
    <form id="form">
      <div class="input-wrap">
        <textarea id="question" rows="1" placeholder="Pergunte qualquer coisa…" autocomplete="off"></textarea>
        <button type="submit" id="send-btn" aria-label="Enviar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"></line>
            <polyline points="5 12 12 5 19 12"></polyline>
          </svg>
        </button>
      </div>
    </form>
    <p class="disclaimer">Respostas geradas por IA · Verifique informações importantes</p>
  </div>
</div>

<script>
const API_URL = "http://localhost:8000/api/chat/conversation";

const form = document.getElementById("form");
const input = document.getElementById("question");
const output = document.getElementById("output");
const sendBtn = document.getElementById("send-btn");
const welcome = document.getElementById("welcome");

let activeController = null;
let processingCard = null;
let processingBody = null;
let toolCardEl = null;
let toolNameEl = null;
let toolStatusEl = null;
let toolBadgeEl = null;
let toolProgressBar = null;
let toolBodyEl = null;
let currentAiBlock = null;
let processingRaw = "";
let currentToolKey = "";
let toolHistory = [];
let toolTimelineEl = null;
let toolTimelineRendered = false;

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function scrollBottom() {
  output.scrollTop = output.scrollHeight;
}

function hideWelcome() {
  if (welcome && welcome.parentNode) {
    welcome.style.opacity = '0';
    welcome.style.transition = 'opacity 0.3s ease';
    setTimeout(() => welcome.remove(), 300);
  }
}

function ensureAiBlock() {
  if (!currentAiBlock) {
    currentAiBlock = document.createElement('div');
    currentAiBlock.className = 'ai-block';
    output.appendChild(currentAiBlock);
  }
  return currentAiBlock;
}

input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 180) + 'px';
  sendBtn.classList.toggle('ready', input.value.trim().length > 0);
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (input.value.trim()) form.dispatchEvent(new Event('submit'));
  }
});

function addUserBubble(text) {
  const div = document.createElement('div');
  div.className = 'user-bubble';
  div.textContent = text;
  output.appendChild(div);
  currentAiBlock = null;
  scrollBottom();
}

function addStepPill(data) {
  const block = ensureAiBlock();
  const stepType = (data && data.step ? String(data.step) : 'thinking').toLowerCase();
  const content = getContent(data);

  const pill = document.createElement('div');
  pill.className = `step-pill ${stepType}`;

  const dot = document.createElement('span');
  dot.className = 'dot';

  const label = document.createElement('span');
  label.textContent = content || stepType;

  pill.appendChild(dot);
  pill.appendChild(label);
  block.appendChild(pill);
  scrollBottom();
}

function ensureProcessingCard() {
  if (processingCard) return processingBody;

  const block = ensureAiBlock();

  processingCard = document.createElement('div');
  processingCard.className = 'processing-card';

  const header = document.createElement('div');
  header.className = 'processing-header';

  const gem = document.createElementNS('http://www.w3.org/2000/svg','svg');
  gem.setAttribute('class','gem-small');
  gem.setAttribute('width','16');
  gem.setAttribute('height','16');
  gem.setAttribute('viewBox','0 0 28 28');
  gem.setAttribute('fill','none');
  gem.innerHTML = `
    <path d="M14 2L20 10L14 14L8 10Z" fill="#8ab4f8"/>
    <path d="M14 14L20 10L22 18L14 26Z" fill="#c58af9"/>
    <path d="M14 14L8 10L6 18L14 26Z" fill="#f28b82"/>
    <path d="M14 14L6 18L14 26L22 18Z" fill="rgba(197,138,249,0.4)"/>
  `;

  const lbl = document.createElement('span');
  lbl.className = 'processing-label';
  lbl.textContent = 'respondendo';

  header.appendChild(gem);
  header.appendChild(lbl);

  processingBody = document.createElement('div');
  processingBody.className = 'processing-body markdown-body typing';

  processingCard.appendChild(header);
  processingCard.appendChild(processingBody);
  block.appendChild(processingCard);
  return processingBody;
}

async function appendProcessing(data) {
  const chunk = getContent(data);
  if (!chunk) return;
  const body = ensureProcessingCard();
  processingRaw += chunk;
  body.innerHTML = renderMarkdown(processingRaw);
  scrollBottom();
  await sleep(0);
}

function finalizeProcessing() {
  if (processingBody) {
    processingBody.innerHTML = renderMarkdown(processingRaw);
    processingBody.classList.remove('typing');
    processingBody = null;
    processingCard = null;
    processingRaw = "";
  }
}

function getToolKey(data) {
  if (!data || typeof data !== 'object') return 'ferramenta';
  return String(data.id || data.tool || data.name || data.label || data.title || 'ferramenta');
}

function getToolName(data) {
  if (!data || typeof data !== 'object') return 'ferramenta';
  return String(data.tool || data.name || data.label || data.title || data.id || 'ferramenta');
}

function getToolStatus(data) {
  if (!data || typeof data !== 'object') return 'executando';
  if (data.done || data.finished || data.success) return 'concluído';
  return String(data.status || data.state || 'executando');
}

function createToolTimelineBadge() {
  const block = ensureAiBlock();

  if (toolTimelineEl && toolTimelineEl.parentNode) {
    toolTimelineEl.remove();
  }

  toolTimelineEl = document.createElement('div');
  toolTimelineEl.className = 'tool-timeline-wrap';

  const title = document.createElement('div');
  title.className = 'tool-timeline-title';
  title.textContent = 'timeline das tools';

  const row = document.createElement('div');
  row.className = 'tool-timeline';

  toolHistory.forEach((item, index) => {
    const chip = document.createElement('span');
    chip.className = 'tool-timeline-chip';
    chip.style.animationDelay = `${index * 70}ms`;

    const idx = document.createElement('span');
    idx.className = 'tool-timeline-index';
    idx.textContent = String(index + 1);

    const label = document.createElement('span');
    label.textContent = item.name;

    chip.appendChild(idx);
    chip.appendChild(label);
    row.appendChild(chip);
  });

  toolTimelineEl.appendChild(title);
  toolTimelineEl.appendChild(row);
  block.appendChild(toolTimelineEl);
  scrollBottom();
}

function ensureToolCard(data) {
  const name = getToolName(data);
  const status = getToolStatus(data);
  const key = getToolKey(data);

  if (!toolCardEl || currentToolKey !== key) {
    if (toolCardEl) finalizeToolCard(true);

    const block = ensureAiBlock();

    toolCardEl = document.createElement('div');
    toolCardEl.className = 'tool-card active entering';

    const header = document.createElement('div');
    header.className = 'tool-header';

    const iconWrap = document.createElement('div');
    iconWrap.className = 'tool-icon-wrap';
    iconWrap.textContent = '⚙';

    const meta = document.createElement('div');
    meta.className = 'tool-meta';

    toolNameEl = document.createElement('div');
    toolNameEl.className = 'tool-name';
    toolNameEl.textContent = name;

    toolStatusEl = document.createElement('div');
    toolStatusEl.className = 'tool-status';
    toolStatusEl.textContent = 'executando ferramenta';

    meta.appendChild(toolNameEl);
    meta.appendChild(toolStatusEl);

    toolBadgeEl = document.createElement('div');
    toolBadgeEl.className = 'tool-badge running';
    toolBadgeEl.textContent = status;

    header.appendChild(iconWrap);
    header.appendChild(meta);
    header.appendChild(toolBadgeEl);

    const progress = document.createElement('div');
    progress.className = 'tool-progress';
    toolProgressBar = document.createElement('div');
    toolProgressBar.className = 'tool-progress-bar';
    progress.appendChild(toolProgressBar);

    toolBodyEl = document.createElement('div');
    toolBodyEl.className = 'tool-body';

    toolCardEl.appendChild(header);
    toolCardEl.appendChild(progress);
    toolCardEl.appendChild(toolBodyEl);
    block.appendChild(toolCardEl);

    requestAnimationFrame(() => {
      if (toolCardEl) toolCardEl.classList.add('animate-in');
      if (toolCardEl) toolCardEl.classList.remove('entering');
    });

    currentToolKey = key;

    if (!toolHistory.some(item => item.key === key)) {
      toolHistory.push({ key, name });
    }
  } else {
    if (toolNameEl) toolNameEl.textContent = name;
    if (toolStatusEl) toolStatusEl.textContent = status;
    if (toolBadgeEl) toolBadgeEl.textContent = status;
  }

  return toolBodyEl;
}

async function appendTool(data) {
  const chunk = getContent(data);
  const body = ensureToolCard(data);

  if (chunk) {
    const span = document.createElement('span');
    span.className = 'chunk';
    span.textContent = chunk;
    body.appendChild(span);
    body.classList.add('has-content');
  }

  if (data && (data.done || data.finished || data.success)) {
    finalizeToolCard(true);
  }

  scrollBottom();
  await sleep(0);
}

function finalizeToolCard() {
  if (!toolCardEl) return;
  toolCardEl.classList.remove('active');
  toolCardEl.classList.add('done');
  if (toolBadgeEl) {
    toolBadgeEl.textContent = 'concluído';
    toolBadgeEl.className = 'tool-badge done';
  }
  if (toolStatusEl) toolStatusEl.textContent = 'finalizado';
  toolCardEl = null;
  toolNameEl = null;
  toolStatusEl = null;
  toolBadgeEl = null;
  toolProgressBar = null;
  toolBodyEl = null;
  currentToolKey = "";
}

function addStatusLine(type, message) {
  const block = ensureAiBlock();
  const line = document.createElement('div');
  line.className = `status-line ${type}`;

  const icon = document.createElement('div');
  icon.className = 'status-icon';
  icon.textContent = type === 'success' ? '✓' : type === 'error' ? '✕' : '·';

  const txt = document.createElement('span');
  txt.textContent = message;

  line.appendChild(icon);
  line.appendChild(txt);
  block.appendChild(line);
  scrollBottom();
}

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function safeUrl(value) {
  const url = String(value || '').trim();
  if (!url) return '';
  if (/^(https?:|mailto:|tel:|#|\/|\.\/|\.\.\/)/i.test(url)) return escapeHtml(url);
  if (/^data:image\//i.test(url)) return escapeHtml(url);
  return '';
}

function getDomain(url) {
  try { return new URL(url).hostname.replace(/^www\./, ''); }
  catch { return ''; }
}

function tryParseJsonPayload(raw) {
  const value = raw.trim();
  if (!value.startsWith('{') || !value.endsWith('}')) return null;
  try { return JSON.parse(value); } catch { return null; }
}

function renderSearchPayload(payload) {
  const parts = [];
  if (payload.answer) parts.push(`<p>${renderInline(payload.answer)}</p>`);

  if (Array.isArray(payload.locations) && payload.locations.length) {
    const locations = payload.locations.map(location => {
      const name = escapeHtml(location.name || 'Localização');
      const lat = Number(location.lat);
      const lng = Number(location.lng);
      const mapUrl = safeUrl(location.url || `https://www.openstreetmap.org/?mlat=${lat}&mlon=${lng}#map=16/${lat}/${lng}`);
      const mapsUrl = safeUrl(`https://www.google.com/maps/search/?api=1&query=${lat},${lng}`);
      return `
        <article class="md-location-card">
          <div class="md-location-title">${name}</div>
          <div class="md-location-meta"><span class="md-badge">lat ${Number.isFinite(lat) ? lat : ''}</span> <span class="md-badge">lng ${Number.isFinite(lng) ? lng : ''}</span></div>
          <div class="md-location-actions">
            ${mapUrl ? `<a class="md-action-link" href="${mapUrl}" target="_blank" rel="noopener noreferrer">OpenStreetMap</a>` : ''}
            ${mapsUrl ? `<a class="md-action-link" href="${mapsUrl}" target="_blank" rel="noopener noreferrer">Google Maps</a>` : ''}
          </div>
        </article>`;
    }).join('');
    parts.push(`<div class="md-location-grid">${locations}</div>`);
  }

  if (Array.isArray(payload.results) && payload.results.length) {
    const cards = payload.results.map(result => renderLinkCard(result)).join('');
    parts.push(`<div class="md-link-grid">${cards}</div>`);
  } else if (Array.isArray(payload.urls) && payload.urls.length) {
    const cards = payload.urls.map(url => renderLinkCard({ url, title: getDomain(url) || url })).join('');
    parts.push(`<div class="md-link-grid">${cards}</div>`);
  }

  if (payload.error) parts.push(`<blockquote>${renderInline(payload.error)}</blockquote>`);
  return parts.join('');
}

function renderLinkCard(result) {
  const url = safeUrl(result.url || '');
  if (!url) return '';
  const title = escapeHtml(result.title || result.domain || getDomain(result.url) || result.url);
  const description = escapeHtml(result.description || '');
  const domain = escapeHtml(result.domain || getDomain(result.url));
  return `
    <a class="md-link-card" href="${url}" target="_blank" rel="noopener noreferrer">
      <div class="md-link-title">${title}</div>
      ${description ? `<div class="md-link-desc">${description}</div>` : ''}
      ${domain ? `<div class="md-link-domain">${domain}</div>` : ''}
    </a>`;
}

function renderMarkdown(raw) {
  const payload = tryParseJsonPayload(raw);
  if (payload && (payload.results || payload.urls || payload.locations)) {
    return renderSearchPayload(payload);
  }

  let text = String(raw || '').replace(/\r\n/g, '\n');
  const stash = [];
  const save = html => {
    const token = `@@HTML_${stash.length}@@`;
    stash.push(html);
    return token;
  };

  text = text.replace(/```(\w+)?\n([\s\S]*?)```/g, (_, lang, code) => {
    const label = lang ? ` data-lang="${escapeHtml(lang)}"` : '';
    return save(`<pre${label}><code>${escapeHtml(code.trim())}</code></pre>`);
  });

  text = text.replace(/:::card\s*([^\n]*)\n([\s\S]*?)\n:::/g, (_, title, body) => {
    return save(`<article class="md-card"><div class="md-card-title">${renderInline(title || 'Card')}</div><div class="md-card-body">${renderMarkdown(body)}</div></article>`);
  });

  text = text.replace(/:::collapse\s*([^\n]*)\n([\s\S]*?)\n:::/g, (_, title, body) => {
    return save(`<details class="md-collapse"><summary>${renderInline(title || 'Detalhes')}</summary><div class="md-collapse-body">${renderMarkdown(body)}</div></details>`);
  });

  text = renderTables(text, save);
  const blocks = text.split(/\n{2,}/).map(block => renderBlock(block)).filter(Boolean);
  let html = blocks.join('');
  stash.forEach((value, index) => { html = html.replaceAll(`@@HTML_${index}@@`, value); });
  html = renderCoordinateCards(html);
  return html;
}

function renderTables(text, save) {
  const lines = text.split('\n');
  const output = [];
  for (let i = 0; i < lines.length; i++) {
    if (i + 1 < lines.length && isTableLine(lines[i]) && /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(lines[i + 1])) {
      const tableLines = [lines[i], lines[i + 1]];
      i += 2;
      while (i < lines.length && isTableLine(lines[i])) {
        tableLines.push(lines[i]);
        i++;
      }
      i--;
      output.push(save(renderTable(tableLines)));
    } else {
      output.push(lines[i]);
    }
  }
  return output.join('\n');
}

function isTableLine(line) {
  return /^\s*\|.+\|\s*$/.test(line || '');
}

function splitTableRow(line) {
  return line.trim().replace(/^\|/, '').replace(/\|$/, '').split('|').map(cell => cell.trim());
}

function renderTable(lines) {
  const headers = splitTableRow(lines[0]);
  const rows = lines.slice(2).map(splitTableRow);
  const thead = headers.map(cell => `<th>${renderInline(cell)}</th>`).join('');
  const tbody = rows.map(row => `<tr>${row.map(cell => `<td>${renderInline(cell)}</td>`).join('')}</tr>`).join('');
  return `<div class="md-table-wrap"><table><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table></div>`;
}

function renderBlock(block) {
  const value = block.trim();
  if (!value) return '';
  if (/^@@HTML_\d+@@$/.test(value)) return value;
  if (/^#{1,3}\s+/.test(value)) {
    const level = value.match(/^#+/)[0].length;
    return `<h${level}>${renderInline(value.replace(/^#{1,3}\s+/, ''))}</h${level}>`;
  }
  if (/^>\s?/.test(value)) {
    return `<blockquote>${renderInline(value.replace(/^>\s?/gm, ''))}</blockquote>`;
  }
  if (/^[-*]\s+/m.test(value)) {
    const items = value.split('\n').filter(Boolean).map(line => `<li>${renderInline(line.replace(/^[-*]\s+/, ''))}</li>`).join('');
    return `<ul>${items}</ul>`;
  }
  if (/^\d+\.\s+/m.test(value)) {
    const items = value.split('\n').filter(Boolean).map(line => `<li>${renderInline(line.replace(/^\d+\.\s+/, ''))}</li>`).join('');
    return `<ol>${items}</ol>`;
  }
  return `<p>${renderInline(value).replace(/\n/g, '<br>')}</p>`;
}

function renderInline(value) {
  let html = escapeHtml(value);
  html = html.replace(/!\[([^\]]*)\]\(([^\s)]+)(?:\s+&quot;([^&]*)&quot;)?\)/g, (_, alt, src, title) => {
    const url = safeUrl(src);
    if (!url) return escapeHtml(alt);
    const caption = title || alt;
    return `<figure><img src="${url}" alt="${escapeHtml(alt)}" loading="lazy">${caption ? `<figcaption>${escapeHtml(caption)}</figcaption>` : ''}</figure>`;
  });
  html = html.replace(/\[([^\]]+)\]\(([^\s)]+)\)/g, (_, label, href) => {
    const url = safeUrl(href);
    if (!url) return label;
    return `<a href="${url}" target="_blank" rel="noopener noreferrer">${label}</a>`;
  });
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  html = html.replace(/\[\[badge:([^\]]+)\]\]/gi, '<span class="md-badge">$1</span>');
  html = html.replace(/(^|\s)(https?:\/\/[^\s<]+[^\s<.,;:!?])/g, (_, prefix, url) => `${prefix}<a href="${safeUrl(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(url)}</a>`);
  return html;
}

function renderCoordinateCards(html) {
  return html.replace(/\b(?:lat(?:itude)?[:\s]+)?(-?\d{1,2}\.\d{3,})\s*[,;]\s*(?:lng|lon|longitude)?[:\s]*(-?\d{1,3}\.\d{3,})\b/gi, (match, lat, lng) => {
    const latNum = Number(lat);
    const lngNum = Number(lng);
    if (!Number.isFinite(latNum) || !Number.isFinite(lngNum)) return match;
    if (Math.abs(latNum) > 90 || Math.abs(lngNum) > 180) return match;
    const osm = safeUrl(`https://www.openstreetmap.org/?mlat=${latNum}&mlon=${lngNum}#map=16/${latNum}/${lngNum}`);
    return `<span class="md-badge">lat ${latNum}</span> <span class="md-badge">lng ${lngNum}</span> <a class="md-action-link" href="${osm}" target="_blank" rel="noopener noreferrer">mapa</a>`;
  });
}

function parseEvent(block) {
  const lines = block.split('\n');
  let event = 'message', data = '';
  for (const line of lines) {
    if (line.startsWith('event:')) event = line.replace('event:', '').trim();
    if (line.startsWith('data:')) data += line.replace('data:', '').trim();
  }
  try { data = JSON.parse(data); } catch {}
  return { event, data };
}

function getContent(data) {
  if (typeof data === 'string') return data;
  if (!data || typeof data !== 'object') return '';
  return String(data.content || data.message || data.text || data.chunk || data.delta || data.value || '');
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const question = input.value.trim();
  if (!question) return;

  hideWelcome();
  finalizeProcessing();
  finalizeToolCard();
  toolHistory = [];
  toolTimelineRendered = false;
  if (toolTimelineEl && toolTimelineEl.parentNode) toolTimelineEl.remove();
  toolTimelineEl = null;
  currentToolKey = "";

  if (activeController) activeController.abort();
  activeController = new AbortController();

  addUserBubble(question);
  input.value = '';
  input.style.height = 'auto';
  sendBtn.classList.remove('ready');

  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'text/event-stream', 'Cache-Control': 'no-cache' },
      body: JSON.stringify({ question }),
      signal: activeController.signal
    });

    if (!response.ok) { addStatusLine('error', `HTTP ${response.status} ${response.statusText}`); return; }
    if (!response.body) { addStatusLine('error', 'Stream indisponível'); return; }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const events = buffer.split('\n\n');
      buffer = events.pop() || '';

      for (const eventText of events) {
        if (!eventText.trim()) continue;
        const { event, data } = parseEvent(eventText);

        if (event === 'step') addStepPill(data);
        if (event === 'processing') await appendProcessing(data);
        if (event === 'tool') await appendTool(data);

        if (event === 'finished') {
          finalizeProcessing();
          finalizeToolCard();
          if (!toolTimelineRendered && toolHistory.length) {
            createToolTimelineBadge();
            toolTimelineRendered = true;
          }
          const msg = data && data.message ? String(data.message) : 'Resposta concluída';
          addStatusLine('success', msg);
        }

        if (event === 'error') {
          finalizeProcessing();
          finalizeToolCard();
          const msg = typeof data === 'string' ? data : (data && data.message ? String(data.message) : 'Erro');
          addStatusLine('error', msg);
        }

        scrollBottom();
      }
    }

    finalizeProcessing();
    finalizeToolCard();

    if (!toolTimelineRendered && toolHistory.length) {
      createToolTimelineBadge();
      toolTimelineRendered = true;
    }
  } catch (error) {
    if (error.name !== 'AbortError') {
      finalizeProcessing();
      finalizeToolCard();
      addStatusLine('error', error.message || 'Erro inesperado');
    }
  } finally {
    activeController = null;
    input.focus();
  }
});

input.focus();
</script>
</body>
</html>
